<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="roundclip">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0f172a"/>

  <!-- Subtle hex grid backdrop -->
  <g opacity="0.07" stroke="#F59E0B" stroke-width="1.5" fill="none">
    <polygon points="256,60 316,94 316,162 256,196 196,162 196,94"/>
    <polygon points="256,316 316,350 316,418 256,452 196,418 196,350"/>
    <polygon points="128,188 188,222 188,290 128,324 68,290 68,222"/>
    <polygon points="384,188 444,222 444,290 384,324 324,290 324,222"/>
  </g>

  <!-- Node connector lines (blockchain reference) -->
  <g stroke="#F59E0B" stroke-width="2.5" opacity="0.35" stroke-linecap="round">
    <line x1="340" y1="128" x2="390" y2="168"/>
    <line x1="340" y1="384" x2="390" y2="344"/>
    <line x1="340" y1="128" x2="340" y2="384"/>
  </g>

  <!-- Node dots -->
  <circle cx="340" cy="128" r="9" fill="#F59E0B" opacity="0.5"/>
  <circle cx="390" cy="168" r="7" fill="#F59E0B" opacity="0.35"/>
  <circle cx="340" cy="384" r="9" fill="#F59E0B" opacity="0.5"/>
  <circle cx="390" cy="344" r="7" fill="#F59E0B" opacity="0.35"/>

  <!-- Main C arc — bold, centered slightly left -->
  <path
    d="M 330 110 A 160 160 0 1 0 330 402"
    fill="none"
    stroke="#F59E0B"
    stroke-width="52"
    stroke-linecap="round"
  />

  <!-- Inner cutout to make C thinner/cleaner at large sizes -->
  <path
    d="M 330 110 A 160 160 0 1 0 330 402"
    fill="none"
    stroke="#0f172a"
    stroke-width="12"
    stroke-linecap="round"
    opacity="0.0"
  />

  <!-- Small amber accent dot at C opening top -->
  <circle cx="330" cy="110" r="16" fill="#F59E0B"/>
  <!-- Small amber accent dot at C opening bottom -->
  <circle cx="330" cy="402" r="16" fill="#F59E0B"/>

</svg>
